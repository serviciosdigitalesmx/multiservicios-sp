<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiservicios SP · Integrador</title>
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/integrador.css">
</head>
<body>
  <section id="authGate" class="auth-gate" aria-live="polite">
    <div class="auth-card">
      <h2>Acceso Integrador</h2>
      <p>Inicia sesión para administrar solicitudes, cotizaciones y servicios.</p>
      <form id="authForm" class="auth-form">
        <label for="authUser">Usuario</label>
        <input id="authUser" class="input-lite" type="text" autocomplete="username" required>
        <label for="authPass">Contraseña</label>
        <input id="authPass" class="input-lite" type="password" autocomplete="current-password" required>
        <button type="submit" class="btn-primary">Entrar</button>
        <small id="authError" class="auth-error" aria-live="assertive"></small>
      </form>
    </div>
  </section>

  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <img src="assets/img/logo-multiservicios-sp.png" alt="Multiservicios SP" class="brand-logo">
        <div class="brand-text">
          <strong>MULTISERVICIOS SP</strong>
          <small>Integrador técnico</small>
        </div>
      </div>

      <nav class="menu">
        <button type="button" data-module="dashboard" class="menu-btn is-active">Tablero</button>
        <button type="button" data-module="solicitudes" class="menu-btn">Solicitudes</button>
        <button type="button" data-module="cotizaciones" class="menu-btn">Cotizaciones</button>
        <button type="button" data-module="servicios" class="menu-btn">Servicios</button>
        <button type="button" data-module="agenda" class="menu-btn">Agenda</button>
      </nav>
      <button type="button" id="logoutBtn" class="menu-btn logout-btn">Cerrar sesión</button>
    </aside>

    <main class="workspace-wrap">
      <header class="workspace-header">
        <h1 id="workspace-title">Tablero</h1>
      </header>
      <section id="workspace" class="workspace" aria-live="polite"></section>
    </main>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/router.js"></script>
</body>
</html>
