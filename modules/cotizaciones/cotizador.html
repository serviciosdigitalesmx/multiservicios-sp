<section class="module-view">
  <h2 class="module-title">Cotización manual</h2>
  <p class="module-muted" id="cotizadorHint">Genera cotizaciones directas sin necesidad de solicitud previa.</p>

  <div class="panel-card" id="cotizadorPanel" style="margin-top:12px;">
    <h3 style="margin-top:0; margin-bottom:16px;">Nueva cotización manual</h3>
    <div class="grid2">
      <div>
        <label class="input-group"><i class="far fa-user"></i> Cliente</label>
        <input id="cotCliente" class="input-lite" type="text">
      </div>
      <div>
        <label class="input-group"><i class="fas fa-phone-alt"></i> Teléfono</label>
        <input id="cotTelefono" class="input-lite" type="text">
      </div>
      <div>
        <label class="input-group"><i class="fas fa-wrench"></i> Servicio</label>
        <input id="cotServicio" class="input-lite" type="text">
      </div>
      <div>
        <label class="input-group"><i class="fas fa-map-marker-alt"></i> Dirección</label>
        <input id="cotDireccion" class="input-lite" type="text">
      </div>
    </div>

    <div class="panel-card" style="margin-top:16px; background: var(--surface-alt);">
      <h4 style="margin-top:0;">Conceptos</h4>
      <div id="conceptosWrap"></div>
      <button type="button" class="btn-secondary" id="addConceptoBtn" style="margin: 12px 0;">
        <i class="fas fa-plus-circle"></i> Agregar concepto
      </button>
      <div style="margin-top:16px;">
        <label class="input-group"><i class="fas fa-stethoscope"></i> Diagnóstico</label>
        <textarea id="cotDiagnostico" class="input-lite" rows="3" placeholder="Describe hallazgos técnicos"></textarea>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px; font-size:1.2rem;">
        <strong>Total:</strong>
        <strong id="cotTotal" style="color: var(--primary);">$0.00</strong>
      </div>
    </div>

    <div style="display:flex;gap:10px;flex-wrap:wrap;margin:20px 0 10px;">
      <button type="button" id="guardarCotBtn" class="btn-primary">
        <i class="fas fa-save"></i> Guardar cotización
      </button>
      <button type="button" id="cotWhatsBtn" class="btn-secondary">
        <i class="fab fa-whatsapp"></i> WhatsApp cliente
      </button>
      <button type="button" id="pdfCotBtn" class="btn-secondary" disabled>
        <i class="fas fa-file-pdf"></i> Generar PDF
      </button>
    </div>

    <div class="panel-card" style="margin-top:16px;">
      <h4 style="margin-top:0;">Programar servicio</h4>
      <div class="grid2">
        <div>
          <label>Fecha</label>
          <input id="srvFecha" class="input-lite" type="date">
        </div>
        <div>
          <label>Hora</label>
          <input id="srvHora" class="input-lite" type="time">
        </div>
        <div>
          <label>Técnico</label>
          <input id="srvTecnico" class="input-lite" type="text" placeholder="Nombre del técnico">
        </div>
      </div>
      <button type="button" id="programarSrvBtn" class="btn-primary" disabled style="margin-top:16px;">
        <i class="fas fa-calendar-check"></i> Programar servicio
      </button>
    </div>
  </div>
</section>
